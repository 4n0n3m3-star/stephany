<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stephany Ribeiro - Portfolio</title>
    <link rel="icon" type="image/png" href="/media/christmas-stars.png">
    <meta property="og:image" content="https://stephanytattoo.com/media/christmas-stars.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://stephanytattoo.com/media/christmas-stars.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tenor+Sans&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --cream-light: #FDFAF7;
            --cream:       #ECD9D0;
            --blush:       #E6CCBD;
            --rose-taupe:  #D0B8AC;
            --taupe:       #B09080;
            --warm-brown:  #A77049;
            --dark-brown:  #8C6248;
            --text:        #2C1A0E;
            --text-light:  #7A5C48;
        }

        html { scroll-behavior: smooth; }

        body {
            background: var(--cream-light);
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            line-height: 1.7;
            overflow-x: hidden;
        }

        /* ─── NAV ─────────────────────────────────────── */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 28px 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(253,250,247,0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--blush);
        }
        .nav-back {
            font-size: 0.62rem;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: var(--text-light);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: color 0.3s;
        }
        .nav-back:hover { color: var(--warm-brown); }
        .nav-back svg { width: 14px; height: 14px; }
        .nav-brand {
            font-family: 'Tenor Sans', serif;
            font-size: 0.9rem;
            letter-spacing: 0.12em;
            color: var(--text);
            text-decoration: none;
        }

        /* ─── PORTFOLIO GRID ──────────────────────────── */
        .portfolio-grid-section {
            padding: 96px 16px 160px;
            overflow: hidden;
        }
        .portfolio-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            max-width: 1600px;
            margin: 0 auto;
            gap: 12px;
        }
        .portfolio-col { display: grid; gap: 12px; align-content: start; }
        .portfolio-item { overflow: hidden; border-radius: 4px; }
        .portfolio-item img {
            width: 100%;
            height: 55vw;
            max-height: 680px;
            min-height: 320px;
            object-fit: cover;
            object-position: center;
            display: block;
        }
        .col-1 .portfolio-item,
        .col-3 .portfolio-item {
            will-change: transform;
        }

        /* ─── LINKS SECTION ───────────────────────── */
        .links-section {
            background: var(--text);
            padding: 0 72px;
            text-align: center;
        }
        .links-item { padding: 88px 0; }
        .links-rule {
            width: 100%;
            height: 1px;
            background: rgba(253,250,247,0.1);
        }
        .links-label {
            display: block;
            font-size: 0.68rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            color: var(--blush);
            margin-bottom: 20px;
        }
        .links-link {
            font-family: 'Tenor Sans', serif;
            font-size: clamp(2.2rem, 5vw, 7.5rem);
            font-weight: 300;
            color: var(--cream-light);
            text-decoration: none;
            line-height: 1;
            position: relative;
            display: inline-block;
        }
        .links-link::after {
            content: '';
            position: absolute;
            bottom: 4px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--cream-light);
            transition: width 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .links-link:hover::after { width: 100%; }

        /* ─── DARK MODE ───────────────────────────────── */
        html.dark body { background: #130a03; color: var(--cream); }
        html.dark nav {
            background: rgba(19,10,3,0.92);
            border-color: #3a2418;
        }
        html.dark .nav-back { color: var(--rose-taupe); }
        html.dark .nav-back:hover { color: var(--warm-brown); }
        html.dark .nav-brand { color: var(--cream-light); }
        html.dark .links-section { background: #0a0602; }

        /* ─── MOBILE MENU ─────────────────────────── */
        .nav-menu-btn {
            font-size: 0.62rem;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: var(--text-light);
            background: none;
            border: none;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            padding: 0;
            transition: color 0.3s;
        }
        .nav-menu-btn:hover { color: var(--warm-brown); }
        .mobile-menu {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: var(--cream-light);
            display: flex;
            flex-direction: column;
            --mp: clamp(32px, 8vw, 120px);
            padding: 28px var(--mp) 48px;
            transform: translateY(-100%);
            transition: transform 0.55s cubic-bezier(0.76, 0, 0.24, 1);
            pointer-events: none;
        }
        .mobile-menu.open {
            transform: translateY(0);
            pointer-events: all;
        }
        .mobile-menu-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: auto;
        }
        .mobile-menu-brand {
            font-family: 'Tenor Sans', serif;
            font-size: 0.9rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text);
            text-decoration: none;
        }
        .mobile-menu-close {
            font-size: 0.62rem;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: var(--text-light);
            background: none;
            border: none;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            padding: 0;
        }
        .mobile-menu-center {
            display: flex;
            flex-direction: column;
            margin: auto 0;
        }
        .menu-theme-btn { display: none; }
        .mobile-menu-links {
            list-style: none;
            padding: 0;
        }
        .mobile-menu-links li { overflow: hidden; }
        .mobile-menu-links a {
            display: block;
            font-family: 'Tenor Sans', serif;
            font-size: clamp(2.8rem, 12vw, 5rem);
            line-height: 1.15;
            color: var(--text);
            text-decoration: none;
            transition: color 0.25s;
        }
        .mobile-menu-links a:hover { color: var(--warm-brown); }
        .mobile-menu-lang-row { padding-bottom: 20px; }
        .mobile-menu-bottom {
            border-top: 1px solid var(--blush);
            margin-left: calc(-1 * var(--mp));
            margin-right: calc(-1 * var(--mp));
            padding: 28px var(--mp) 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .mobile-menu-bottom-col:nth-child(2) { text-align: right; }
        .mobile-menu-bottom-col span {
            display: block;
            font-size: 0.55rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text-light);
            margin-bottom: 12px;
        }
        .mobile-menu-bottom-col a {
            display: block;
            font-size: 0.75rem;
            letter-spacing: 0.06em;
            color: var(--text);
            text-decoration: none;
            line-height: 2;
            transition: color 0.25s;
        }
        .mobile-menu-bottom-col a:hover { color: var(--warm-brown); }
        html.dark .mobile-menu { background: #130a03; }
        html.dark .mobile-menu-brand,
        html.dark .mobile-menu-links a { color: var(--cream-light); }
        html.dark .mobile-menu-links a:hover { color: var(--rose-taupe); }
        html.dark .mobile-menu-bottom { border-color: #3a2418; }
        html.dark .mobile-menu-bottom-col a { color: var(--cream); }
        html.dark .mobile-menu-close { color: var(--rose-taupe); }

        /* ─── THEME SWITCH ────────────────────────── */
        .theme-switch-btn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            cursor: pointer;
            color: var(--text-light);
            overflow: hidden;
            padding: 0;
            transition: color 0.3s;
        }
        .theme-switch-btn:hover { color: var(--warm-brown); }
        .theme-switch-btn svg {
            position: absolute;
            width: 17px;
            height: 17px;
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1),
                        opacity 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }
        .theme-switch-btn .icon-sun  { transform: scale(1) translateY(0); opacity: 1; }
        .theme-switch-btn .icon-moon { transform: scale(0.5) translateY(20px); opacity: 0; }
        .theme-switch-btn.dark .icon-sun  { transform: scale(0.5) translateY(20px); opacity: 0; }
        .theme-switch-btn.dark .icon-moon { transform: scale(1) translateY(0); opacity: 1; }
        html.dark .theme-switch-btn { color: var(--rose-taupe); }
        html.dark .theme-switch-btn:hover { color: var(--cream); }

        /* ─── LANG BTN ────────────────────────────── */
        .lang-btn {
            font-size: 0.56rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-light);
            background: none;
            border: 1px solid var(--rose-taupe);
            border-radius: 2px;
            padding: 5px 9px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            transition: color 0.3s, border-color 0.3s;
        }
        .lang-btn:hover { color: var(--warm-brown); border-color: var(--warm-brown); }
        html.dark .lang-btn { color: var(--rose-taupe); border-color: #5a3a28; }
        html.dark .lang-btn:hover { color: var(--cream); border-color: var(--rose-taupe); }

        /* ─── PAGE LOADER ───────────────────────────── */
        #page-loader {
            position: fixed;
            inset: 0;
            z-index: 999;
            background: #2C1A0E;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: all;
            transition: opacity 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        #page-loader.out {
            opacity: 0;
            pointer-events: none;
        }
        #page-loader img {
            width: 48px;
            animation: loaderBreath 1.6s ease-in-out infinite;
        }
        @keyframes loaderBreath {
            0%, 100% { transform: scale(0.9);  opacity: 0.5; }
            50%       { transform: scale(1.02); opacity: 1;   }
        }

        @media (max-width: 900px) {
            .portfolio-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
            .col-3 { display: none; }
            .portfolio-item img { height: 60vw; max-height: none; }
        }
        @media (max-width: 600px) {
            nav { padding: 20px 24px; }
            .nav-brand { font-size: 0.72rem; letter-spacing: 0.08em; }
            .theme-switch-btn { display: none; }
            .menu-theme-btn { display: flex; margin-bottom: 12px; align-self: flex-start; }
            .portfolio-grid-section { padding: 80px 8px 32px; }
            .portfolio-grid { grid-template-columns: 1fr; gap: 8px; }
            .col-2, .col-3 { display: none; }
            .portfolio-item img { height: 80vw; }
            .links-section { padding: 0 20px; }
            .links-item { padding: 44px 0; }
            .links-link { font-size: clamp(1rem, 5.2vw, 1.8rem); }
        }
    </style>
</head>

<script>
    // ─── Page loader ──────────────────────────────
    (function() {
        const loader = document.getElementById('page-loader');
        setTimeout(() => { loader.classList.add('out'); }, 480);
        document.querySelectorAll('a[href]').forEach(link => {
            const href = link.getAttribute('href');
            if (href && href !== '#' && !href.startsWith('#') && !href.startsWith('mailto:') && !href.startsWith('http')) {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    loader.classList.remove('out');
                    setTimeout(() => { window.location.href = href; }, 500);
                });
            }
        });
    })();

    // ─── i18n ──────────────────────────────────────
    const i18n = {
        pt: {
            'back': 'Voltar',
            'nav-menu': 'Menu', 'nav-close': 'Fechar',
            'nav-home': 'Início', 'nav-book': 'Marcar',
            'mobile-social': 'Redes Sociais', 'mobile-contact': 'Contacto', 'mobile-lang': 'Idioma',
            'links-bookings': 'Marcações &amp; Contacto ↗', 'links-instagram': 'Instagram ↗',
        },
        en: {
            'back': 'Back',
            'nav-menu': 'Menu', 'nav-close': 'Close',
            'nav-home': 'Home', 'nav-book': 'Book',
            'mobile-social': 'Social', 'mobile-contact': 'Contact', 'mobile-lang': 'Language',
            'links-bookings': 'Bookings &amp; Enquiries ↗', 'links-instagram': 'Instagram ↗',
        }
    };
    function applyLang(lang) {
        const t = i18n[lang];
        document.documentElement.lang = lang;
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const v = t[el.dataset.i18n]; if (v !== undefined) el.innerHTML = v;
        });
        const btn = document.getElementById('lang-switch');
        if (btn) btn.textContent = lang === 'pt' ? 'EN' : 'PT';
        localStorage.setItem('lang', lang);
    }
    (function() {
        const lang = localStorage.getItem('lang') || 'pt';
        applyLang(lang);
        document.getElementById('lang-switch').addEventListener('click', () => {
            applyLang((localStorage.getItem('lang') || 'pt') === 'pt' ? 'en' : 'pt');
        });
    })();

    // Mobile menu
    const mobileMenu = document.getElementById('mobile-menu');
    document.getElementById('menu-open-btn').addEventListener('click', () => {
        mobileMenu.classList.add('open');
        mobileMenu.setAttribute('aria-hidden', 'false');
    });
    function closeMenu() {
        mobileMenu.classList.remove('open');
        mobileMenu.setAttribute('aria-hidden', 'true');
    }
    document.getElementById('menu-close-btn').addEventListener('click', closeMenu);
    document.querySelectorAll('.menu-link').forEach(a => a.addEventListener('click', closeMenu));
    document.getElementById('menu-brand-link').addEventListener('click', closeMenu);

    // Theme switch
    const themeBtn = document.getElementById('theme-switch');
    const themeBtnMenu = document.getElementById('theme-switch-menu');
    function applyTheme(isDark) {
        document.documentElement.classList.toggle('dark', isDark);
        themeBtn.classList.toggle('dark', isDark);
        if (themeBtnMenu) themeBtnMenu.classList.toggle('dark', isDark);
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }
    applyTheme(localStorage.getItem('theme') === 'dark');
    themeBtn.addEventListener('click', () => applyTheme(!themeBtn.classList.contains('dark')));
    if (themeBtnMenu) themeBtnMenu.addEventListener('click', () => applyTheme(!themeBtn.classList.contains('dark')));

    // Parallax grid — mirrors ParallaxScrollSecond framer-motion behaviour
    // Column 1: y(0→-200), x(0→-200), rotateZ(0→-20)
    // Column 3: y(0→-200), x(0→+200), rotateZ(0→+20)
    (function () {
        const section = document.getElementById('grid-section');
        const col1Items = document.querySelectorAll('#col-1 .portfolio-item');
        const col3Items = document.querySelectorAll('#col-3 .portfolio-item');

        function update() {
            if (window.innerWidth <= 900) {
                col1Items.forEach(el => { el.style.transform = ''; });
                col3Items.forEach(el => { el.style.transform = ''; });
                return;
            }

            const rect = section.getBoundingClientRect();
            // progress: 0 when section top hits viewport bottom, 1 when section bottom hits viewport top
            const total = rect.height + window.innerHeight;
            const progress = Math.max(0, Math.min(1, (window.innerHeight - rect.top) / total));

            const ty  = progress * -200;
            const tx1 = progress * -200;
            const tx3 = progress *  200;
            const rz1 = progress * -20;
            const rz3 = progress *  20;

            col1Items.forEach(el => {
                el.style.transform = `translateY(${ty}px) translateX(${tx1}px) rotateZ(${rz1}deg)`;
            });
            col3Items.forEach(el => {
                el.style.transform = `translateY(${ty}px) translateX(${tx3}px) rotateZ(${rz3}deg)`;
            });
        }

        window.addEventListener('scroll', update, { passive: true });
        update();
    })();
</script>
