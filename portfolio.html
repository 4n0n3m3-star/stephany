<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEPHANY RIBEIRO - Portfolio</title>
    <link rel="icon" type="image/png" href="/media/christmas-stars.png">
    <meta property="og:image" content="https://stephanytattoo.com/media/christmas-stars.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://stephanytattoo.com/media/christmas-stars.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tenor+Sans&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --cream-light: #FDFAF7;
            --cream:       #ECD9D0;
            --blush:       #E6CCBD;
            --rose-taupe:  #D0B8AC;
            --taupe:       #B09080;
            --warm-brown:  #A77049;
            --dark-brown:  #8C6248;
            --text:        #2C1A0E;
            --text-light:  #7A5C48;
        }

        html { scroll-behavior: smooth; }

        body {
            background: var(--cream-light);
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            line-height: 1.7;
            overflow-x: hidden;
        }

        /* ─── NAV ─────────────────────────────────────── */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            padding: 28px 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(253,250,247,0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--blush);
        }
        .nav-back {
            font-size: 0.62rem;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: var(--text-light);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: color 0.3s;
        }
        .nav-back:hover { color: var(--warm-brown); }
        .nav-back svg { width: 14px; height: 14px; }
        .nav-brand {
            font-family: 'Tenor Sans', serif;
            font-size: 0.9rem;
            letter-spacing: 0.12em;
            color: var(--text);
            text-decoration: none;
        }

        /* ─── PORTFOLIO GRID ──────────────────────────── */
        .portfolio-grid-section {
            padding: 96px 16px 160px;
            overflow: hidden;
        }
        .portfolio-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            max-width: 1600px;
            margin: 0 auto;
            gap: 12px;
        }
        .portfolio-col { display: grid; gap: 12px; align-content: start; }
        .portfolio-item { overflow: hidden; border-radius: 4px; }
        .portfolio-item img {
            width: 100%;
            height: 55vw;
            max-height: 680px;
            min-height: 320px;
            object-fit: cover;
            object-position: center;
            display: block;
        }
        .col-1 .portfolio-item,
        .col-3 .portfolio-item {
            will-change: transform;
        }

        /* ─── LINKS SECTION ───────────────────────── */
        .links-section {
            background: var(--text);
            padding: 0 72px;
            text-align: center;
        }
        .links-item { padding: 88px 0; }
        .links-rule {
            width: 100%;
            height: 1px;
            background: rgba(253,250,247,0.1);
        }
        .links-label {
            display: block;
            font-size: 0.68rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            color: var(--blush);
            margin-bottom: 20px;
        }
        .links-link {
            font-family: 'Tenor Sans', serif;
            font-size: clamp(2.2rem, 5vw, 7.5rem);
            font-weight: 300;
            color: var(--cream-light);
            text-decoration: none;
            line-height: 1;
            position: relative;
            display: inline-block;
        }
        .links-link::after {
            content: '';
            position: absolute;
            bottom: 4px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--cream-light);
            transition: width 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .links-link:hover::after { width: 100%; }

        /* ─── DARK MODE ───────────────────────────────── */
        html.dark body { background: #130a03; color: var(--cream); }
        html.dark nav {
            background: rgba(19,10,3,0.92);
            border-color: #3a2418;
        }
        html.dark .nav-back { color: var(--rose-taupe); }
        html.dark .nav-back:hover { color: var(--warm-brown); }
        html.dark .nav-brand { color: var(--cream-light); }
        html.dark .links-section { background: #0a0602; }

        @media (max-width: 900px) {
            .portfolio-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
            .col-3 { display: none; }
            .portfolio-item img { height: 60vw; max-height: none; }
        }
        @media (max-width: 600px) {
            nav { padding: 20px 24px; }
            .portfolio-grid-section { padding: 80px 8px 32px; }
            .portfolio-grid { grid-template-columns: 1fr; gap: 8px; }
            .col-2, .col-3 { display: none; }
            .portfolio-item img { height: 80vw; }
            .links-section { padding: 0 20px; }
            .links-item { padding: 44px 0; }
            .links-link { font-size: clamp(1rem, 5.2vw, 1.8rem); }
        }
    </style>
</head>
<body>

<nav>
    <a href="/" class="nav-back">
        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.2">
            <path d="M10 7H4M4 7L7 4M4 7L7 10"/>
        </svg>
        Back
    </a>
    <a href="/" class="nav-brand">STEPHANY RIBEIRO</a>
</nav>

<!-- ─── PARALLAX GRID ──────────────────────────── -->
<section class="portfolio-grid-section" id="grid-section">
    <div class="portfolio-grid">

        <!-- Column 1 — scrolls left + up + rotates CCW -->
        <div class="portfolio-col col-1" id="col-1">
            <div class="portfolio-item"><img src="media/floral/floral-1.jpg" alt="Floral tattoo"></div>
            <div class="portfolio-item"><img src="media/letters/letters-grateful.jpg" alt="Script tattoo"></div>
            <div class="portfolio-item"><img src="media/estrelas/estrelas-2.jpg" alt="Abstract tattoo"></div>
            <div class="portfolio-item"><img src="media/floral/floral-4.jpg" alt="Floral tattoo"></div>
            <div class="portfolio-item"><img src="media/letters/letters-fonts-2.jpg" alt="Script tattoo"></div>
        </div>

        <!-- Column 2 — static -->
        <div class="portfolio-col col-2">
            <div class="portfolio-item"><img src="media/estrelas/estrelas-1.jpg" alt="Abstract tattoo"></div>
            <div class="portfolio-item"><img src="media/floral/floral-2.jpg" alt="Floral tattoo"></div>
            <div class="portfolio-item"><img src="media/letters/letters-minimalist-1.jpg" alt="Script tattoo"></div>
            <div class="portfolio-item"><img src="media/estrelas/estrelas-3.jpg" alt="Abstract tattoo"></div>
            <div class="portfolio-item"><img src="media/floral/floral-5.jpg" alt="Floral tattoo"></div>
        </div>

        <!-- Column 3 — scrolls right + up + rotates CW -->
        <div class="portfolio-col col-3" id="col-3">
            <div class="portfolio-item"><img src="media/floral/floral-3.jpg" alt="Floral tattoo"></div>
            <div class="portfolio-item"><img src="media/letters/letters-minimalist-2.jpg" alt="Script tattoo"></div>
            <div class="portfolio-item"><img src="media/estrelas/estrelas-4.jpg" alt="Abstract tattoo"></div>
            <div class="portfolio-item"><img src="media/floral/floral-6.jpg" alt="Floral tattoo"></div>
            <div class="portfolio-item"><img src="media/letters/letters-fonts-1.jpg" alt="Script tattoo"></div>
        </div>

    </div>
</section>

<!-- ─── LINKS ─────────────────────────────────────── -->
<section class="links-section">
    <div class="links-item">
        <span class="links-label">Bookings &amp; Enquiries ↗</span>
        <a href="mailto:art@stephanytattoo.com" class="links-link">art@stephanytattoo.com</a>
    </div>
    <div class="links-rule"></div>
    <div class="links-item">
        <span class="links-label">Instagram ↗</span>
        <a href="https://www.instagram.com/stephany.tattoo/" target="_blank" rel="noopener" class="links-link">@stephany.tattoo</a>
    </div>
</section>

<script>
    // Inherit theme
    document.documentElement.classList.remove('dark');

    // Parallax grid — mirrors ParallaxScrollSecond framer-motion behaviour
    // Column 1: y(0→-200), x(0→-200), rotateZ(0→-20)
    // Column 3: y(0→-200), x(0→+200), rotateZ(0→+20)
    (function () {
        const section = document.getElementById('grid-section');
        const col1Items = document.querySelectorAll('#col-1 .portfolio-item');
        const col3Items = document.querySelectorAll('#col-3 .portfolio-item');

        function update() {
            if (window.innerWidth <= 900) {
                col1Items.forEach(el => { el.style.transform = ''; });
                col3Items.forEach(el => { el.style.transform = ''; });
                return;
            }

            const rect = section.getBoundingClientRect();
            // progress: 0 when section top hits viewport bottom, 1 when section bottom hits viewport top
            const total = rect.height + window.innerHeight;
            const progress = Math.max(0, Math.min(1, (window.innerHeight - rect.top) / total));

            const ty  = progress * -200;
            const tx1 = progress * -200;
            const tx3 = progress *  200;
            const rz1 = progress * -20;
            const rz3 = progress *  20;

            col1Items.forEach(el => {
                el.style.transform = `translateY(${ty}px) translateX(${tx1}px) rotateZ(${rz1}deg)`;
            });
            col3Items.forEach(el => {
                el.style.transform = `translateY(${ty}px) translateX(${tx3}px) rotateZ(${rz3}deg)`;
            });
        }

        window.addEventListener('scroll', update, { passive: true });
        update();
    })();
</script>
  <script src="/_vercel/speed-insights/script.js" defer></script>

</body>
</html>
